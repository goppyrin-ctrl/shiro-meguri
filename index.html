<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>城あつめ 〜戦国武将収集絵巻〜</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header id="topbar">
  <h1>城あつめ <span class="sub">〜戦国武将収集絵巻〜</span></h1>
  <div id="hud">
    <span>🌟 Lv <b id="hud-lv">1</b></span>
    <span>👣 <b id="hud-steps">0</b> 歩</span>
    <span>🤝 仲間 <b id="hud-allies">0</b> 人</span>
    <span>🏯 攻略 <b id="hud-castles">0</b>/66 城</span>
  </div>
</header>
<nav id="tabs">
  <button data-tab="map" class="active">地図</button>
  <button data-tab="zukan">武将名鑑</button>
  <button data-tab="self">我が身</button>
  <button data-tab="opt">設定</button>
</nav>
<main>
  <section id="tab-map" class="tab active">
    <div id="mapwrap">
      <svg id="map" xmlns="http://www.w3.org/2000/svg"></svg>
      <div id="modebar">
        <button id="mode-btn">📍 現地モードへ</button>
        <span id="mode-status">🚶 旅モード</span>
      </div>
      <div id="zoomctl">
        <button id="zin" title="拡大">＋</button>
        <button id="zout" title="縮小">−</button>
        <button id="zhome" title="全体">全</button>
      </div>
      <div id="nodepanel" class="hidden"></div>
    </div>
  </section>
  <section id="tab-zukan" class="tab"></section>
  <section id="tab-self" class="tab"></section>
  <section id="tab-opt" class="tab"></section>
</main>
<div id="toasts"></div>
<div id="overlay" class="hidden"><div id="modal"></div></div>
<script src="data.js"></script>
<script src="game.js"></script>
</body>
</html>
